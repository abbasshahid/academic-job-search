name: 🕷️ Scrape, Commit, Build & Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 0'  # weekly on Sundays at midnight UTC
  workflow_dispatch: {}

permissions:
  contents: write

env:
  NOTIFY_KEYWORDS: 'phd,graduate,researcher,preadoc,assistant'

jobs:
  scrape_build_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      # -------- Save old jobs for diff notification --------
      - name: Save previous jobs JSON (if any)
        run: |
          if [ -f public/prebuilt_jobs.json ]; then
            cp public/prebuilt_jobs.json prev_jobs.json
          else
            echo '[]' > prev_jobs.json
          fi

      - name: Clear previous matches
        run: echo "matches=" >> $GITHUB_ENV

      # -------- Setup Node --------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # -------- Install root deps (for Vite build) --------
      # Use `npm install`, not `npm ci`: package-lock.json is intentionally
      # gitignored in this repo, and `npm ci` aborts when no lockfile is present.
      - name: Install site dependencies
        run: npm install

      # -------- Install scraper deps --------
      - name: Install scraper dependencies & Playwright
        working-directory: scraper
        run: |
          npm install
          npx playwright install-deps
          npx playwright install

      # -------- Run scraper --------
      - name: Run scraper (one-off)
        working-directory: scraper
        run: node server.js

      # -------- Detect new matches --------
      - name: Detect new job postings matching notification keywords
        id: notify
        run: |
          # The payload is now an object ({ generatedAt, jobs, sources, stats }).
          # Support both the new object form and the legacy flat-array form,
          # match a new posting by URL (so changing timestamps don't flag every
          # job as new), and turn the comma-separated keyword list into a proper
          # regex alternation for jq's test().
          jq -n \
            --slurpfile old prev_jobs.json \
            --slurpfile new public/prebuilt_jobs.json \
            --arg re "$NOTIFY_KEYWORDS" '
            ($re | gsub(","; "|")) as $rx
            | (if ($old[0] | type) == "array" then $old[0] else ($old[0].jobs // []) end) as $oldjobs
            | (if ($new[0] | type) == "array" then $new[0] else ($new[0].jobs // []) end) as $newjobs
            | ($oldjobs | map(.url)) as $oldurls
            | [ $newjobs[]
                | .url as $u
                | select(($oldurls | index($u)) == null)
                | select(((.title // "") | ascii_downcase) | test($rx; "i"))
                | "\(.title) - \(.url)"
              ]' > new_matches.json

          if [ -s new_matches.json ]; then
            echo "matches<<EOF" >> $GITHUB_ENV
            jq -r ".[]" new_matches.json >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      # -------- Email notifications --------
      - name: Send email notification
        if: env.matches != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port:    ${{ secrets.SMTP_PORT }}
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          subject: "New Job Listings Matching Keywords"
          to:             ${{ secrets.NOTIFY_EMAIL }}
          from:           ${{ secrets.SMTP_FROM }}
          body: |
            The following new job postings matched your notification keywords:
            ${{ env.matches }}

      - name: Send no-match notification
        if: env.matches == ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port:    ${{ secrets.SMTP_PORT }}
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          subject: "Job Update Completed"
          to:             ${{ secrets.NOTIFY_EMAIL }}
          from:           ${{ secrets.SMTP_FROM }}
          body: |
            The job scraping run has completed successfully, but no new postings matched your notification keywords: ${{ env.NOTIFY_KEYWORDS }}

      # -------- Commit JSON back to main --------
      - name: Commit updated jobs JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/prebuilt_jobs.json
          git diff --quiet --cached || git commit -m "chore: update prebuilt_jobs.json"
          git push

      # -------- Build site with fresh JSON --------
      - name: Build site
        run: npm run build

      # -------- Deploy to GitHub Pages --------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist